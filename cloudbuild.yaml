# GCP Cloud Build configuration for ResolveAI
# This file can be used for building directly in GCP

steps:
  # Build Backend Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/backend:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/backend:latest"
      - "./backend"
    id: "build-backend"

  # Build Frontend Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/frontend:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/frontend:latest"
      - "--build-arg"
      - "NEXT_PUBLIC_API_BASE_URL=${_BACKEND_URL}"
      - "./frontend"
    id: "build-frontend"
    waitFor: ["build-backend"]

  # Push Backend Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/backend"
    id: "push-backend"
    waitFor: ["build-backend"]

  # Push Frontend Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/frontend"
    id: "push-frontend"
    waitFor: ["build-frontend"]

  # Deploy Backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "resolveai-backend"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/backend:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-secrets"
      - "GROQ_API_KEY=groq-api-key:latest,TAVILY_API_KEY=tavily-api-key:latest"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--set-env-vars"
      - "ENVIRONMENT=production,LOG_LEVEL=INFO"
    id: "deploy-backend"
    waitFor: ["push-backend"]

  # Deploy Frontend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "resolveai-frontend"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/frontend:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "256Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "5"
    id: "deploy-frontend"
    waitFor: ["push-frontend", "deploy-backend"]

substitutions:
  _REGION: "asia-south1"
  _BACKEND_URL: "https://resolveai-backend-xxxxx-xx.a.run.app"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/backend:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/resolveai/frontend:${SHORT_SHA}"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
