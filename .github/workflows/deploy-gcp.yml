name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  BACKEND_SERVICE: resolveai-backend
  FRONTEND_SERVICE: resolveai-frontend

jobs:
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select GCP auth mode
        id: auth_mode
        shell: bash
        run: |
          if [[ -n "${{ secrets.GCP_SA_KEY }}" ]]; then
            echo "mode=key" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" && -n "${{ secrets.GCP_SERVICE_ACCOUNT }}" ]]; then
            echo "mode=wif" >> "$GITHUB_OUTPUT"
          else
            echo "mode=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate GCP deployment inputs
        shell: bash
        run: |
          if [[ "${{ steps.auth_mode.outputs.mode }}" == "none" ]]; then
            echo "::error::Missing GCP auth configuration. Set either:"
            echo "::error::1) secret GCP_SA_KEY, or"
            echo "::error::2) secrets GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT"
            exit 1
          fi
          if [[ -z "${{ env.PROJECT_ID }}" ]]; then
            echo "::error::Missing PROJECT_ID. Set repo variable GCP_PROJECT_ID or secret GCP_PROJECT_ID."
            exit 1
          fi

      - name: Authenticate to Google Cloud (service account key)
        if: ${{ steps.auth_mode.outputs.mode == 'key' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud (workload identity)
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Backend Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resolveai/backend:${{ github.sha }} ./backend

      - name: Push Backend Image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resolveai/backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resolveai/backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets GROQ_API_KEY=groq-api-key:latest,TAVILY_API_KEY=tavily-api-key:latest \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars ENVIRONMENT=production,LOG_LEVEL=INFO

          # Get service URL
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --region ${{ env.REGION }} --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend deployed to: $URL"

  deploy-frontend:
    name: 🚀 Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select GCP auth mode
        id: auth_mode
        shell: bash
        run: |
          if [[ -n "${{ secrets.GCP_SA_KEY }}" ]]; then
            echo "mode=key" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" && -n "${{ secrets.GCP_SERVICE_ACCOUNT }}" ]]; then
            echo "mode=wif" >> "$GITHUB_OUTPUT"
          else
            echo "mode=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate GCP deployment inputs
        shell: bash
        run: |
          if [[ "${{ steps.auth_mode.outputs.mode }}" == "none" ]]; then
            echo "::error::Missing GCP auth configuration. Set either:"
            echo "::error::1) secret GCP_SA_KEY, or"
            echo "::error::2) secrets GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT"
            exit 1
          fi
          if [[ -z "${{ env.PROJECT_ID }}" ]]; then
            echo "::error::Missing PROJECT_ID. Set repo variable GCP_PROJECT_ID or secret GCP_PROJECT_ID."
            exit 1
          fi

      - name: Authenticate to Google Cloud (service account key)
        if: ${{ steps.auth_mode.outputs.mode == 'key' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud (workload identity)
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ needs.deploy-backend.outputs.backend_url }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resolveai/frontend:${{ github.sha }} \
            ./frontend

      - name: Push Frontend Image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resolveai/frontend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resolveai/frontend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5

          # Get service URL
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --region ${{ env.REGION }} --format="value(status.url)")
          echo "Frontend deployed to: $URL"
